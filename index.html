<!--
  ==========================================================
   PERSONALIZE AQUI (é só trocar o texto entre aspas):
   - Linha "NOME": o nome dela
   - Linha "ASSINATURA": como você quer assinar
  ==========================================================
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Para o meu amor 💗</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --ceu-topo: #2b1d4e;
    --ceu-meio: #7d4a8c;
    --ceu-baixo: #ff9aa8;
    --ceu-horizonte: #ffd6a0;
    --coral: #ff6f91;
    --rosa: #ffb3c6;
    --creme: #fff5f7;
    --dourado: #ffe3a3;
    --texto: #fff5f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: "Quicksand", sans-serif;
    color: var(--texto);
    background: linear-gradient(180deg,
      var(--ceu-topo) 0%,
      var(--ceu-meio) 42%,
      var(--ceu-baixo) 78%,
      var(--ceu-horizonte) 100%);
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- estrelas ---------- */
  .estrelas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .estrela {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: piscar var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--atraso, 0s);
    box-shadow: 0 0 6px #fff, 0 0 10px var(--dourado);
  }
  @keyframes piscar {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50%      { opacity: 0.9; transform: scale(1); }
  }

  /* ---------- corações subindo ---------- */
  .coracoes { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
  .coracao {
    position: absolute;
    bottom: -40px;
    font-size: var(--tam, 22px);
    animation: subir var(--vel, 9s) linear infinite;
    animation-delay: var(--d, 0s);
    opacity: 0;
    filter: drop-shadow(0 0 6px rgba(255,111,145,0.6));
  }
  @keyframes subir {
    0%   { transform: translateY(0) translateX(0) rotate(0deg) scale(0.6); opacity: 0; }
    12%  { opacity: 0.95; }
    90%  { opacity: 0.85; }
    100% { transform: translateY(-115vh) translateX(var(--desvio, 30px)) rotate(25deg) scale(1); opacity: 0; }
  }

  /* ---------- cartão central ---------- */
  .cartao {
    position: relative;
    z-index: 3;
    padding: 2.4rem 1.6rem;
    max-width: 640px;
    animation: surgir 1.6s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes surgir {
    from { opacity: 0; transform: translateY(28px) scale(.96); filter: blur(6px); }
    to   { opacity: 1; transform: none; filter: none; }
  }

  .saudacao {
    font-family: "Dancing Script", cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 500;
    color: var(--dourado);
    margin-bottom: .2rem;
    opacity: 0;
    animation: aparecer 1s ease .4s both;
  }

  .nome {
    font-family: "Dancing Script", cursive;
    font-size: clamp(3.4rem, 13vw, 6rem);
    font-weight: 700;
    line-height: 1;
    color: var(--creme);
    text-shadow: 0 2px 24px rgba(255,111,145,.7);
    opacity: 0;
    animation: aparecer 1.1s ease .7s both;
  }

  /* ---------- coração pulsante ---------- */
  .pulso {
    font-size: clamp(3rem, 11vw, 4.6rem);
    margin: 1.1rem 0;
    display: inline-block;
    animation: bater 1.3s ease-in-out infinite;
    filter: drop-shadow(0 0 16px rgba(255,111,145,.9));
  }
  @keyframes bater {
    0%, 100% { transform: scale(1); }
    15%      { transform: scale(1.22); }
    30%      { transform: scale(1); }
    45%      { transform: scale(1.14); }
    60%      { transform: scale(1); }
  }

  .mensagem {
    font-size: clamp(1.05rem, 3.4vw, 1.3rem);
    font-weight: 500;
    line-height: 1.7;
    color: var(--creme);
    max-width: 30ch;
    margin: 0 auto;
    opacity: 0;
    animation: aparecer 1.2s ease 1.2s both;
  }

  /* frase digitada */
  .frase {
    font-family: "Dancing Script", cursive;
    font-size: clamp(1.5rem, 5.5vw, 2.2rem);
    color: var(--dourado);
    margin-top: 1.4rem;
    min-height: 1.4em;
  }
  .frase .cursor {
    display: inline-block;
    width: 2px;
    background: var(--dourado);
    margin-left: 2px;
    animation: pisca-cursor .7s steps(1) infinite;
  }
  @keyframes pisca-cursor { 50% { opacity: 0; } }

  .assinatura {
    margin-top: 1.8rem;
    font-size: clamp(.95rem, 3vw, 1.1rem);
    font-weight: 500;
    color: var(--rosa);
    opacity: 0;
    animation: aparecer 1.2s ease 2.4s both;
  }
  .assinatura span {
    font-family: "Dancing Script", cursive;
    font-size: 1.35em;
    color: var(--creme);
  }

  .dica {
    position: fixed;
    bottom: 14px; left: 0; right: 0;
    z-index: 3;
    font-size: .8rem;
    color: rgba(255,245,247,.65);
    opacity: 0;
    animation: aparecer 1.2s ease 3.2s both;
    pointer-events: none;
  }

  @keyframes aparecer { to { opacity: 1; } }

  /* coração que explode ao tocar */
  .toque {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    font-size: 26px;
    animation: estourar .9s ease-out forwards;
  }
  @keyframes estourar {
    0%   { transform: translate(-50%, -50%) scale(.4); opacity: 1; }
    100% { transform: translate(-50%, -160%) scale(1.4); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
    }
    .cartao, .saudacao, .nome, .mensagem, .assinatura, .dica { opacity: 1 !important; }
  }
</style>

<div class="estrelas" id="estrelas"></div>
<div class="coracoes" id="coracoes"></div>

<main class="cartao">
  <p class="saudacao">Olá, Karine</p>
  <!-- NOME -->
  <h1 class="nome">meu amor</h1>

  <div class="pulso">💗</div>

  <p class="mensagem">
    Eu só queria parar tudo por um segundo e te dizer:
    eu te amo muito, muito mesmo. Você deixa os meus dias
    mais leves, mais bonitos e mais felizes. Obrigado por
    existir e por ser exatamente você. 🌷
  </p>

  <p class="frase" id="frase"><span class="cursor">&nbsp;</span></p>

  <!-- ASSINATURA -->
  <p class="assinatura">Com todo o meu carinho,<br><span>Douglas</span></p>
</main>

<p class="dica">toque na tela 💕</p>

<script>
  const reduzir = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // estrelas
  const ceuEstrelas = document.getElementById("estrelas");
  const totalEstrelas = 70;
  for (let i = 0; i < totalEstrelas; i++) {
    const e = document.createElement("div");
    e.className = "estrela";
    const t = Math.random() * 2 + 1;
    e.style.width = t + "px";
    e.style.height = t + "px";
    e.style.left = Math.random() * 100 + "%";
    e.style.top = Math.random() * 70 + "%";
    e.style.setProperty("--dur", (Math.random() * 3 + 2) + "s");
    e.style.setProperty("--atraso", (Math.random() * 4) + "s");
    ceuEstrelas.appendChild(e);
  }

  // corações subindo
  const ceuCoracoes = document.getElementById("coracoes");
  const emojis = ["💗", "💖", "💕", "🌸", "💝", "🌷", "💞", "✨"];
  function criarCoracao() {
    const c = document.createElement("div");
    c.className = "coracao";
    c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = Math.random() * 100 + "%";
    c.style.setProperty("--tam", (Math.random() * 18 + 16) + "px");
    c.style.setProperty("--vel", (Math.random() * 5 + 7) + "s");
    c.style.setProperty("--desvio", (Math.random() * 120 - 60) + "px");
    ceuCoracoes.appendChild(c);
    setTimeout(() => c.remove(), 14000);
  }
  if (!reduzir) {
    for (let i = 0; i < 12; i++) setTimeout(criarCoracao, i * 600);
    setInterval(criarCoracao, 800);
  }

  // frase digitada
  const frases = [
    "Você é o meu lugar favorito. ♡",
    "Te amo hoje e sempre. ♡",
    "Meu coração é seu. ♡"
  ];
  const elFrase = document.getElementById("frase");
  if (reduzir) {
    elFrase.textContent = frases[0];
  } else {
    let iFrase = 0, iLetra = 0, apagando = false;
    function digitar() {
      const atual = frases[iFrase];
      if (!apagando) {
        iLetra++;
        if (iLetra > atual.length) { apagando = true; setTimeout(digitar, 1800); return; }
      } else {
        iLetra--;
        if (iLetra === 0) { apagando = false; iFrase = (iFrase + 1) % frases.length; }
      }
      elFrase.innerHTML = atual.slice(0, iLetra) + '<span class="cursor">&nbsp;</span>';
      setTimeout(digitar, apagando ? 45 : 80);
    }
    setTimeout(digitar, 2600);
  }

  // toque/clique espalha corações
  function espalhar(x, y) {
    const bichinhos = ["💗", "💕", "💖", "✨", "🌸"];
    for (let i = 0; i < 6; i++) {
      const t = document.createElement("div");
      t.className = "toque";
      t.textContent = bichinhos[Math.floor(Math.random() * bichinhos.length)];
      t.style.left = (x + (Math.random() * 60 - 30)) + "px";
      t.style.top = (y + (Math.random() * 30 - 15)) + "px";
      t.style.fontSize = (Math.random() * 16 + 18) + "px";
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 900);
    }
  }
  window.addEventListener("click", (ev) => espalhar(ev.clientX, ev.clientY));
  window.addEventListener("touchstart", (ev) => {
    const toque = ev.touches[0];
    if (toque) espalhar(toque.clientX, toque.clientY);
  }, { passive: true });
</script>
